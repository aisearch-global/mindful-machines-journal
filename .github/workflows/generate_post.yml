name: Generate & Publish Blog Post

on:
  schedule:
    # Runs every Sunday at 08:00 UTC (6pm AEST / 7pm AEDT)
    - cron: "0 8 * * 0"
  workflow_dispatch:   # Allow manual trigger from GitHub Actions UI

jobs:
  generate-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and publish post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python generate_post.py

      - name: Commit topic state (tracks last-used topics)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last_topic_index 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update topic index [skip ci]"
          git push
